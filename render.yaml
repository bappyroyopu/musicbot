# ============================================================
# Render.com Deployment Configuration
# ============================================================
# Single Web Service Architecture:
#   main.py starts FastAPI + Telegram Bot + PyTgCalls
#   all within ONE asyncio event loop in ONE process.
#   No separate Worker service is needed.
# ============================================================

services:
  # ----------------------------------------------------------
  # Web Service — runs everything:
  #   FastAPI health check (background asyncio task)
  #   Telegram Bot (Pyrogram)
  #   Voice Engine (PyTgCalls)
  # ----------------------------------------------------------
  - type: web
    name: musicbot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free  # Upgrade to 'starter' for production (no sleep)
    region: oregon  # Closest to Telegram MTProto servers
    startCommand: python main.py

    healthCheckPath: /health
    
    envVars:
      - key: API_ID
        sync: false  # Set manually in Render dashboard
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: musicbot-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      # PORT is injected automatically by Render — do not override
      - key: LOG_LEVEL
        value: "INFO"
      - key: MAX_QUEUE_SIZE
        value: "50"
      - key: AUTO_LEAVE_TIMEOUT
        value: "300"
      - key: DEFAULT_VOLUME
        value: "100"
      - key: ON_RENDER
        value: "true"
      - key: TEMP_DIR
        value: "/tmp/music"
      - key: LOGS_DIR
        value: "/tmp/music/logs"
    
    scaling:
      minInstances: 1
      maxInstances: 1

  # ----------------------------------------------------------
  # Database — PostgreSQL
  # ----------------------------------------------------------
databases:
  - name: musicbot-db
    plan: free  # Free tier: 1GB storage, 97 hours/month
    region: oregon
    databaseName: musicbot
    user: musicbot
